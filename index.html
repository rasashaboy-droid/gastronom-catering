<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GASTRONOM CATERING — кейтеринг в Казани</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --raspberry: #E91E4C;
    --raspberry-dark: #B8143A;
    --raspberry-soft: #F4557A;
    --yellow: #FFEB69;
    --yellow-soft: #FFF4A8;

    --cream-50: #FFFCF9;
    --cream-100: #FFEADA;
    --cream-200: #FFD9C2;
    --cream-300: #FFEB69;

    --peach: #FFD9C2;
    --coral: #F4557A;
    --tomato: #E91E4C;
    --brick: #B8143A;

    --ink: #1A0A0F;
    --ink-60: rgba(26, 10, 15, 0.6);
    --ink-40: rgba(26, 10, 15, 0.4);
    --ink-15: rgba(26, 10, 15, 0.15);
    --ink-08: rgba(26, 10, 15, 0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--cream-50);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: clip;
    overflow-y: auto;
    width: 100%;
    max-width: 100vw;
  }
  section { overflow-x: clip; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  a { color: inherit; text-decoration: none; }
  .display { font-family: 'Unbounded', 'Inter', sans-serif; letter-spacing: -0.02em; line-height: 1; font-weight: 700; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  .accent { color: var(--raspberry); }
  .accent-italic { color: var(--raspberry); font-style: italic; font-weight: 600; }

  /* Placeholder */
  .ph {
    position: relative; overflow: hidden;
    background:
      repeating-linear-gradient(135deg, rgba(28,20,15,0.05) 0 1px, transparent 1px 14px),
      linear-gradient(135deg, var(--cream-200), var(--cream-300));
    display: flex; align-items: flex-end; justify-content: flex-start;
  }
  .ph .ph-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--ink-60); padding: 10px 12px;
    background: rgba(255, 249, 241, 0.7); backdrop-filter: blur(6px);
    border-top-right-radius: 10px;
  }
  .ph.coral {
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,0.18) 0 1px, transparent 1px 14px),
      linear-gradient(135deg, var(--coral), var(--tomato));
  }
  .ph.peach {
    background:
      repeating-linear-gradient(135deg, rgba(28,20,15,0.06) 0 1px, transparent 1px 14px),
      linear-gradient(135deg, var(--peach), var(--coral));
  }

  .glass {
    background: rgba(255, 249, 241, 0.55);
    backdrop-filter: blur(14px) saturate(1.3);
    -webkit-backdrop-filter: blur(14px) saturate(1.3);
    border: 1px solid rgba(255, 255, 255, 0.5);
    box-shadow: 0 1px 0 rgba(255,255,255,0.7) inset, 0 8px 24px rgba(28,20,15,0.06);
  }
  .glass-dark {
    background: rgba(28, 20, 15, 0.45);
    backdrop-filter: blur(14px) saturate(1.3);
    -webkit-backdrop-filter: blur(14px) saturate(1.3);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: #FFF9F1;
  }

  /* Container — fluid padding */
  .wrap {
    max-width: 1360px; margin: 0 auto;
    padding: 0 clamp(16px, 3.2vw, 32px);
  }

  /* Nav */
  .nav {
    position: sticky; top: 12px; z-index: 50;
    margin: 12px auto 0;
    padding: 0 clamp(12px, 3.2vw, 32px);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 10px 10px 20px;
    border-radius: 999px;
    max-width: 1296px; margin: 0 auto;
    gap: 12px;
    background: var(--cream-50);
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Unbounded', sans-serif;
    font-weight: 300; letter-spacing: 0.02em;
  }
  .logo-text { display: flex; flex-direction: column; line-height: 1.05; align-items: center; text-align: center; }
  .logo-text-main { font-size: 16px; font-weight: 300; }
  .logo-text-sub { font-size: 11px; font-weight: 300; letter-spacing: 0.24em; margin-top: 2px; }
  .logo-img {
    height: 44px; width: auto; display: block;
    flex-shrink: 0;
  }
  @media (max-width: 560px) {
    .logo-img { height: 52px; }
    .logo-text-main { font-size: 14px; }
    .logo-text-sub { font-size: 10px; }
  }
  .nav-links { display: flex; gap: 4px; }
  .nav-links a {
    padding: 10px 14px; border-radius: 999px;
    font-size: 14px; font-weight: 500; transition: background .2s;
  }
  .nav-links a:hover { background: var(--ink-08); }
  .nav-cta {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 20px;
    background: var(--ink); color: var(--cream-50);
    border-radius: 999px; font-weight: 600; font-size: 14px;
    transition: transform .2s, background .2s;
    white-space: nowrap;
  }
  .nav-phone {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 15px; font-weight: 400;
    color: var(--ink);
    border-radius: 999px;
    white-space: nowrap;
    transition: background .2s;
  }
  .nav-phone:hover { background: var(--ink-08); }
  .online-dot {
    width: 8px; height: 8px; border-radius: 999px;
    background: #3FB56A;
    box-shadow: 0 0 0 3px rgba(63, 181, 106, 0.22), 0 0 8px rgba(63, 181, 106, 0.6);
    animation: pulse-green 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse-green {
    0%, 100% { box-shadow: 0 0 0 3px rgba(63, 181, 106, 0.22), 0 0 8px rgba(63, 181, 106, 0.6); }
    50% { box-shadow: 0 0 0 5px rgba(63, 181, 106, 0.12), 0 0 12px rgba(63, 181, 106, 0.8); }
  }
  @media (max-width: 720px) { .nav-phone { display: none; } }
  .nav-cta:hover { transform: translateY(-1px); background: var(--raspberry); }
  .nav-burger {
    display: none;
    width: 44px; height: 44px; border-radius: 999px;
    background: var(--ink); color: var(--cream-50);
    align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .nav-burger svg { width: 18px; height: 18px; }

  /* Mobile menu drawer */
  .mobile-menu {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(26, 10, 15, 0.96);
    backdrop-filter: blur(18px);
    color: var(--cream-50);
    padding: 80px 24px 32px;
    display: none;
    flex-direction: column;
    gap: 6px;
  }
  .mobile-menu.on { display: flex; }
  .mobile-menu a {
    font-family: 'Unbounded', sans-serif;
    font-size: 28px; font-weight: 500;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    letter-spacing: -0.02em;
  }
  .mobile-menu .close {
    position: absolute; top: 24px; right: 24px;
    width: 44px; height: 44px; border-radius: 999px;
    background: rgba(255,255,255,0.1); color: white;
    display: flex; align-items: center; justify-content: center;
  }
  .mobile-menu .cta-row {
    margin-top: auto; display: flex; flex-direction: column; gap: 10px; padding-top: 24px;
  }

  @media (max-width: 860px) {
    .nav-links { display: none; }
  }
  @media (max-width: 560px) {
    .nav-cta { display: none !important; }
    .nav-burger { display: inline-flex; }
    .mobile-menu a { font-size: 21px !important; }
    .mobile-menu .btn { font-size: 13px !important; padding: 12px 18px !important; }
    .hero-photo a[href="#formats"] {
      left: clamp(16px, 1.6vw, 22px) !important;
      right: clamp(16px, 1.6vw, 22px) !important;
      bottom: clamp(16px, 1.6vw, 22px) !important;
    }
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 16px 24px;
    border-radius: 999px;
    font-weight: 600; font-size: 15px;
    transition: transform .15s, box-shadow .2s, background .2s;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--raspberry); color: white;
    box-shadow: 0 10px 24px -8px rgba(233,30,76,0.55), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 30px -8px rgba(233,30,76,0.7), inset 0 1px 0 rgba(255,255,255,0.3); }
  .btn-ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--ink-15); }
  .btn-ghost:hover { background: var(--ink); color: var(--cream-50); border-color: var(--ink); }
  .btn-light { background: var(--cream-50); color: var(--ink); box-shadow: 0 8px 20px -6px rgba(28,20,15,0.15); }
  .btn-light:hover { transform: translateY(-2px); }
  .btn-glass {
    background: rgba(255, 249, 241, 0.55);
    backdrop-filter: blur(14px) saturate(1.3);
    -webkit-backdrop-filter: blur(14px) saturate(1.3);
    border: 1px solid rgba(255, 255, 255, 0.6);
    box-shadow: 0 1px 0 rgba(255,255,255,0.7) inset, 0 8px 20px -8px rgba(28,20,15,0.1);
    color: var(--ink);
    padding: 16px 56px;
    min-width: 180px;
    justify-content: center;
  }
  .btn-glass:hover { transform: translateY(-2px); background: rgba(255, 249, 241, 0.8); }

  @media (max-width: 560px) {
    .btn { padding: 14px 20px; font-size: 14px; }
  }

  /* Section headers */
  .sec-label {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--ink-60);
    padding: 6px 12px; border-radius: 999px;
    border: 1px dashed var(--ink-15);
  }
  .sec-label .dot { width: 7px; height: 7px; border-radius: 999px; background: var(--raspberry); }

  .icon-glow { filter: drop-shadow(0 0 1px #FF8383); }

  /* Hide spinner arrows on number inputs */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }

  /* Soft multi-direction shadow for all card-like containers (pills excluded) */
  .adv-card,
  .hero-photo,
  .formats-split > div:last-child,
  .calc-shell,
  .calc-shell .glass,
  .process-grid > div,
  .cta-split .glass-dark {
    box-shadow:
      6px -6px 24px -10px rgba(28,20,15,0.07),
      -6px 6px 24px -10px rgba(28,20,15,0.07),
      0 10px 30px -15px rgba(28,20,15,0.08) !important;
  }
  .menu-card {
    box-shadow: none !important;
    transition: box-shadow .25s ease, transform .25s ease !important;
    cursor: pointer;
  }
  .menu-card:hover {
    transform: translateY(-2px);
    box-shadow:
      5px -5px 20px -8px rgba(28,20,15,0.14),
      -5px 5px 20px -8px rgba(28,20,15,0.14),
      0 14px 30px -12px rgba(28,20,15,0.18) !important;
  }

  /* Menu grid: 2 columns on mobile */
  @media (max-width: 640px) {
    .menu-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; }
    .menu-grid .menu-card > div:first-child { height: 120px !important; }
    .menu-grid .menu-card__body { padding: 12px !important; gap: 10px !important; }
    .menu-grid .menu-card__body > div:first-child { flex-direction: column !important; align-items: flex-start !important; gap: 4px !important; }
    .menu-grid .menu-card__body > div:first-child > div:first-child { font-size: 13px !important; }
    .menu-grid .menu-card__body > div:first-child > div:last-child { font-size: 13px !important; }
  }

  /* ---------- QTY STEPPER ---------- */
  .qty-wrap {
    position: relative;
    width: 100%;
    height: 52px;
    border-radius: 999px;
    background: var(--raspberry);
    box-shadow: 0 10px 24px -8px rgba(233,30,76,0.55), inset 0 1px 0 rgba(255,255,255,0.3);
    transition: background .3s cubic-bezier(.22,.9,.3,1),
                box-shadow .3s cubic-bezier(.22,.9,.3,1),
                transform .18s ease;
    overflow: hidden;
  }
  .qty-wrap--sm { height: 40px; }
  .qty-wrap:not(.qty-wrap--active):hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 30px -8px rgba(233,30,76,0.7), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .qty-wrap:not(.qty-wrap--active):active { transform: translateY(0); }
  .qty-wrap--active {
    background: var(--cream-100);
    box-shadow: inset 0 0 0 1px var(--ink-08);
  }

  .qty-face {
    position: absolute; inset: 0;
    display: flex; align-items: center;
    transition: opacity .25s ease;
    pointer-events: auto;
  }
  .qty-face--add {
    justify-content: space-between;
    padding: 0 22px;
    background: transparent;
    border: none;
    cursor: pointer;
    color: white;
    font-weight: 600;
    font-size: 17px;
    font-family: inherit;
    gap: 10px;
    letter-spacing: 0.01em;
  }
  .qty-wrap--sm .qty-face--add { padding: 0 12px; font-size: 15px; justify-content: center; }
  .qty-face--stepper {
    justify-content: space-between;
    padding: 0 8px;
  }
  .qty-wrap--sm .qty-face--stepper { padding: 0 6px; }

  /* visibility */
  .qty-wrap:not(.qty-wrap--active) .qty-face--add { opacity: 1; }
  .qty-wrap:not(.qty-wrap--active) .qty-face--stepper { opacity: 0; pointer-events: none; }
  .qty-wrap--active .qty-face--add { opacity: 0; pointer-events: none; }
  .qty-wrap--active .qty-face--stepper { opacity: 1; }


  .qty-btn {
    width: 40px; height: 40px; border-radius: 999px;
    border: none; cursor: pointer;
    font-size: 20px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    font-family: inherit;
    transition: background .18s, transform .12s;
  }
  .qty-wrap--sm .qty-btn { width: 26px; height: 26px; font-size: 15px; }
  .qty-btn:active:not(:disabled) { transform: scale(0.92); }
  .qty-btn--minus { background: white; color: var(--ink); }
  .qty-btn--minus:hover:not(:disabled) { background: var(--cream-50); }
  .qty-btn--plus { background: white; color: var(--ink); }
  .qty-btn--plus:hover:not(:disabled) { background: var(--cream-50); }
  .qty-count {
    font-weight: 600;
    font-size: 15px;
    color: var(--ink);
  }
  .qty-wrap--sm .qty-count { font-size: 13px; }

  /* ---------- CART PAGE ROW ---------- */
  .cart-row {
    display: grid;
    grid-template-columns: 84px 1fr auto;
    grid-template-areas: "photo body controls";
    gap: 16px;
    align-items: center;
    background: white;
    border-radius: 20px;
    padding: 14px;
  }
  .cart-row__photo {
    grid-area: photo;
    width: 84px; height: 84px;
    border-radius: 14px; overflow: hidden;
    background: var(--cream-100);
  }
  .cart-row__body {
    grid-area: body;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    min-width: 0;
  }
  .cart-row__name { font-weight: 600; font-size: 15px; line-height: 1.3; }
  .cart-row__price { font-size: 13px; white-space: nowrap; }
  .cart-row__controls {
    grid-area: controls;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .cart-row__stepper {
    display: flex; align-items: center;
    background: var(--cream-100);
    border-radius: 999px; padding: 4px;
  }
  .cart-row__qty-btn {
    width: 32px; height: 32px; border-radius: 999px;
    border: none; background: white; cursor: pointer;
    font-size: 18px; font-weight: 600; color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    transition: background .18s;
  }
  .cart-row__qty-btn:hover { background: var(--cream-50); }
  .cart-row__qty {
    min-width: 32px; text-align: center; font-weight: 600; font-size: 14px;
  }
  .cart-row__remove {
    background: transparent; border: none; color: var(--ink-40);
    cursor: pointer; font-size: 20px; padding: 4px 8px;
    transition: color .18s;
  }
  .cart-row__remove:hover { color: var(--tomato); }

  @media (max-width: 640px) {
    .cart-row {
      grid-template-columns: 72px 1fr;
      grid-template-areas:
        "photo body"
        "controls controls";
      row-gap: 12px;
    }
    .cart-row__photo { width: 72px; height: 72px; }
    .cart-row__body {
      flex-direction: row;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 8px 12px;
    }
    .cart-row__name { flex: 1 1 auto; min-width: 0; }
    .cart-row__price {
      flex: 0 0 auto;
      text-align: right;
      white-space: nowrap;
    }
    .cart-row__controls {
      justify-content: space-between;
      width: 100%;
    }
    .cart-row__stepper { flex: 1; justify-content: space-between; }
    .cart-row__qty { flex: 1; }
  }

  /* ---------- FLOATING CART BUTTON ---------- */
  .cart-fab {
    position: fixed;
    right: 24px;
    bottom: calc(24px + env(safe-area-inset-bottom));
    width: 60px; height: 60px;
    border-radius: 999px;
    background: var(--raspberry);
    color: white;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
    box-shadow:
      0 10px 24px -8px rgba(233,30,76,0.55),
      0 4px 10px -4px rgba(26,10,15,0.25);
    z-index: 80;
    transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
  }
  .cart-fab:hover {
    transform: translateY(-2px) scale(1.04);
    background: var(--raspberry-dark);
    box-shadow:
      0 14px 30px -10px rgba(233,30,76,0.65),
      0 6px 14px -4px rgba(26,10,15,0.3);
  }
  .cart-fab:active { transform: translateY(0) scale(0.98); }
  .cart-fab__badge {
    position: absolute;
    top: -4px; right: -4px;
    min-width: 22px; height: 22px;
    padding: 0 6px; border-radius: 999px;
    background: var(--ink);
    color: var(--cream-50);
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--cream-50);
    font-family: 'JetBrains Mono', monospace;
  }
  @media (max-width: 560px) {
    .cart-fab { width: 54px; height: 54px; right: 16px; bottom: calc(16px + env(safe-area-inset-bottom)); }
  }

  /* ---------- MENU DRAWER ---------- */
  .menu-drawer-backdrop {
    position: fixed; inset: 0;
    background: rgba(26,10,15,0.45);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 90;
    opacity: 0;
    animation: fadeIn .25s ease forwards;
  }
  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
  .menu-drawer-backdrop.closing { animation: fadeOut .26s ease forwards; }

  .menu-drawer {
    position: fixed;
    z-index: 100;
    background: var(--cream-50);
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: -20px 0 60px -20px rgba(26,10,15,0.25);
    top: 0; right: 0; bottom: 0;
    width: min(624px, 92vw);
    animation: drawerInRight .32s cubic-bezier(.22,.9,.3,1) both;
  }
  @keyframes drawerInRight {
    from { transform: translateX(100%); }
    to   { transform: translateX(0); }
  }
  @keyframes drawerOutRight {
    from { transform: translateX(0); }
    to   { transform: translateX(100%); }
  }
  @keyframes drawerInUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  @keyframes drawerOutDown {
    from { transform: translateY(0); }
    to   { transform: translateY(100%); }
  }
  .menu-drawer.closing { animation: drawerOutRight .28s cubic-bezier(.4,0,.2,1) forwards; }
  @media (max-width: 720px) {
    .menu-drawer {
      top: auto; right: 0; left: 0; bottom: 0;
      width: 100%;
      max-height: 92vh;
      border-radius: 28px 28px 0 0;
      animation: drawerInUp .32s cubic-bezier(.22,.9,.3,1) both;
    }
    .menu-drawer.closing { animation: drawerOutDown .28s cubic-bezier(.4,0,.2,1) forwards; }
  }
  .menu-drawer__head {
    display:flex; align-items:center; justify-content:space-between;
    gap: 16px;
    padding: 22px 24px 16px;
    flex-shrink: 0;
  }
  .menu-drawer__close {
    width: 40px; height: 40px; border-radius: 999px;
    border: 1.5px solid var(--ink-15);
    background: transparent;
    display:flex; align-items:center; justify-content:center;
    cursor: pointer; flex-shrink: 0;
    transition: background .18s, border-color .18s;
  }
  .menu-drawer__close:hover { background: var(--cream-100); border-color: var(--ink-40); }
  .menu-drawer__body {
    padding: 0 24px 24px;
    overflow-y: auto;
    flex: 1;
  }
  .menu-drawer__foot {
    padding: 16px 24px calc(16px + env(safe-area-inset-bottom)) 24px;
    flex-shrink: 0;
    background: var(--cream-50);
    border-top: 1px solid var(--ink-08);
  }

  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    background: rgba(255,249,241,0.9);
    border: 1px solid var(--ink-08);
    border-radius: 999px;
    font-size: 13px; font-weight: 500;
  }
  .chip .chip-dot { width: 8px; height: 8px; border-radius: 999px; background: var(--raspberry); }

  @keyframes float-y {
    0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); }
  }
  @keyframes marquee {
    from { transform: translateX(0); } to { transform: translateX(-50%); }
  }
  .blob { position: absolute; border-radius: 50%; filter: blur(40px); opacity: 0.6; pointer-events: none; }

  /* ---------- RESPONSIVE SECTION RULES ---------- */

  /* Hero split -> single col <980px */
  @media (max-width: 980px) {
    .hero-split { grid-template-columns: 1fr !important; }
    .hero-split > div { min-height: auto !important; }
    .hero-photo { min-height: 0 !important; aspect-ratio: 4 / 3; width: 100%; height: auto; }
    .hero-photo > img { position: static !important; height: auto !important; }
  }
  @media (max-width: 560px) {
    /* Equal-height text card & photo: same min-height, no aspect-ratio */
    .hero-split > div:first-child { min-height: 420px !important; }
    .hero-photo { aspect-ratio: 1 / 1 !important; min-height: 0 !important; }
    .hero-photo > img { position: static !important; height: auto !important; }
  }

  /* Stats band collapses (keeps its own rules but also tweak margins) */

  /* Formats */
  @media (max-width: 900px) {
    .formats-split { grid-template-columns: 1fr !important; gap: 18px !important; }
    /* Photo block goes AFTER left column (default DOM order), half height */
    .formats-split > div:last-child { min-height: 160px !important; order: 0; }
    .formats-split > div:first-child { order: 1; }

    /* Pills size to content */
    .formats-pills > button {
      padding: 14px 18px !important;
      font-size: 15px !important;
    }

    /* "Не нашли свой формат" — transparent, no card on mobile */
    .formats-nf {
      flex-direction: column !important;
      align-items: center !important;
      text-align: center !important;
      gap: 14px !important;
      padding: 12px 0 4px !important;
      background: transparent !important;
      border: none !important;
      border-radius: 0 !important;
    }
    .formats-nf > div:first-child { justify-content: center !important; }
    .formats-nf > a { padding: 12px 28px !important; font-size: 14px !important; align-self: center !important; }

    /* Freeze photo: only first format visible on mobile, no caption */
    .formats-split > div:last-child > div:not(:first-of-type) { display: none !important; }
    .formats-split > div:last-child > div:first-of-type { opacity: 1 !important; transform: none !important; }
    .formats-split > div:last-child > div:last-child { display: none !important; }
  }

  /* Advantages bento: 5-card layout reflow */
  @media (max-width: 1040px) {
    .adv-bento { grid-template-columns: repeat(6, 1fr) !important; grid-auto-rows: 130px !important; }
    .adv-bento > :nth-child(1) { grid-column: span 6 !important; grid-row: span 2 !important; }
    .adv-bento > :nth-child(2) { grid-column: span 3 !important; grid-row: span 2 !important; }
    .adv-bento > :nth-child(3) { grid-column: span 3 !important; grid-row: span 2 !important; }
    .adv-bento > :nth-child(4) { grid-column: span 6 !important; grid-row: span 1 !important; }
    .adv-bento > :nth-child(5) { grid-column: span 6 !important; grid-row: span 1 !important; }
  }
  @media (max-width: 640px) {
    .adv-bento { grid-template-columns: repeat(2, 1fr) !important; grid-auto-rows: auto !important; gap: 12px !important; }
    .adv-bento > :nth-child(1) { grid-column: span 2 !important; grid-row: auto !important; aspect-ratio: 1.1 / 1; }
    .adv-bento > :nth-child(2) { grid-column: span 1 !important; grid-row: auto !important; aspect-ratio: 1 / 1; }
    .adv-bento > :nth-child(3) { grid-column: span 1 !important; grid-row: auto !important; aspect-ratio: 1 / 1; }
    .adv-bento > :nth-child(4) { grid-column: span 2 !important; grid-row: auto !important; min-height: 135px; }
    .adv-bento > :nth-child(5) { grid-column: span 2 !important; grid-row: auto !important; min-height: 135px; }
    /* Square tiles: smaller text & tighter padding */
    .adv-bento > :nth-child(2), .adv-bento > :nth-child(3) {
      padding: 14px 14px 18px !important;
    }
    .adv-bento > :nth-child(2) .display, .adv-bento > :nth-child(3) .display {
      font-size: 22px !important;
    }
    .adv-bento > :nth-child(2) p, .adv-bento > :nth-child(3) p {
      font-size: 12.5px !important;
    }
    /* Shrink spark badge on photo cards */
    .adv-photo > div:last-child {
      width: 22px !important; height: 22px !important;
      top: 8px !important; right: 8px !important;
    }
    .adv-photo > div:last-child svg {
      width: 9px !important; height: 9px !important;
    }
    /* Fix collapsing photos inside small square tiles */
    .adv-bento > :nth-child(1) .adv-photo { min-height: 180px; }
    .adv-bento > :nth-child(2),
    .adv-bento > :nth-child(3) { aspect-ratio: auto !important; min-height: 260px; }
    .adv-bento > :nth-child(2) .adv-photo,
    .adv-bento > :nth-child(3) .adv-photo {
      flex: none !important;
      height: 120px !important;
      min-height: 120px !important;
    }
  }

  /* Quiz calc */
  @media (max-width: 860px) {
    .calc-split { grid-template-columns: 1fr !important; gap: 0 !important; }
    .calc-split > * { min-width: 0 !important; }
    .calc-split > div:first-child h2 { font-size: 36px !important; }
    /* On mobile: shell becomes transparent wrapper; left column becomes the pink card */
    .calc-shell {
      background: transparent !important;
      box-shadow: none !important;
      padding: 0 !important;
      overflow: visible !important;
      border-radius: 0 !important;
    }
    .calc-shell > div:nth-child(1), .calc-shell > div:nth-child(2) {
      display: none !important; /* hide gloss + radial decor on mobile */
    }
    /* Left col = pink card */
    .calc-split > div:first-child {
      background: linear-gradient(150deg, var(--raspberry-soft) 0%, var(--raspberry) 100%);
      border-radius: 28px;
      padding: 28px 24px 40px;
      box-shadow: 0 20px 40px -20px rgba(233,30,76,0.4);
      position: relative;
      z-index: 2;
      margin-bottom: -20px; /* pink overlaps beige */
    }
    /* Beige glass: separate card below, same width, behind pink */
    .calc-shell .glass {
      margin: 0 !important;
      border-radius: 28px !important;
      min-height: 0 !important;
      position: relative;
      z-index: 1;
      padding-top: 44px !important; /* room for pink overlap */
    }
    /* Opts 2-col */
    .calc-opts { grid-template-columns: 1fr 1fr !important; gap: 8px !important; }
    .calc-opts button { padding: 12px !important; }
    .calc-opts button > div:first-child { font-size: 14px !important; }
    .calc-opts button > div:last-child { font-size: 11px !important; }
  }
  @media (max-width: 480px) {
    .calc-opts { grid-template-columns: 1fr 1fr !important; }
  }

  /* Menu & Reviews & Stats cards */
  @media (max-width: 900px) {
    .social-stats, .social-reviews { grid-template-columns: 1fr 1fr !important; }
    .social-reviews > :nth-child(3) { grid-column: span 2; }
  }
  @media (max-width: 640px) {
    .social-stats, .social-reviews { grid-template-columns: 1fr !important; }
    .social-reviews > :nth-child(3) { grid-column: span 1; }
  }

  /* Process */
  @media (max-width: 1040px) {
    .process-grid { grid-template-columns: repeat(2, 1fr) !important; }
  }
  @media (max-width: 560px) {
    .process-grid { grid-template-columns: 1fr !important; }
  }

  /* FAQ */
  @media (max-width: 860px) {
    .faq-split { grid-template-columns: 1fr !important; gap: 28px !important; }
    .faq-split > div:first-child { position: static !important; }
  }

  /* Final CTA */
  @media (max-width: 860px) {
    .cta-split { grid-template-columns: 1fr !important; gap: 28px !important; }
  }

  .stack-v { display: flex; flex-direction: column; }

  /* Mobile: reduce section vertical padding */
  @media (max-width: 720px) {
    section[id="calc"], section[id="menu"], section[id="faq"] { padding: 48px 0 !important; }
    /* Process / Social wrappers have no id — target by padding value fallback via .wrap parent: use generic section */
  }
  @media (max-width: 560px) {
    .display { letter-spacing: -0.03em; }
  }
</style>
