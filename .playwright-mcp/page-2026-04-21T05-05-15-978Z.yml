    - generic [ref=e467]:
      - generic [ref=e468] [cursor=pointer]:
        - generic [ref=e469]:
          - generic [ref=e470]: За сколько дней нужно бронировать?
          - img [ref=e472]
        - paragraph [ref=e475]: Лучше обращаться заранее, но в целом можем взять заказ и за сутки. Для мероприятий это тоже рабочий срок. Если событие крупное, с индивидуальным меню, оформлением или дополнительными услугами, лучше писать раньше — так будет больше времени спокойно всё согласовать.
      - generic [ref=e476] [cursor=pointer]:
        - generic [ref=e477]:
          - generic [ref=e478]: Можно ли заказать посуду, сервировку и обслуживание?
          - img [ref=e480]
        - paragraph [ref=e482]: Да. Можем привезти еду в боксах, сделать выкладку на вашу посуду или привезти свою. При необходимости добавим сервировку, обслуживание на мероприятии, приготовление на площадке, декор и другие детали — всё это можно собрать в одном заказе.
      - generic [ref=e483] [cursor=pointer]:
        - generic [ref=e484]:
          - generic [ref=e485]: Можно ли сделать халяль, веган или другое особое меню?
          - img [ref=e487]
        - paragraph [ref=e489]: "Да, меню можно адаптировать под запрос гостей. Халяль делаем отдельно: для этого используем отдельные халяльные ножи и доски и закупаем халяльные продукты животного происхождения. Если есть другие ограничения по составу, их тоже лучше обсудить заранее при согласовании меню."
      - generic [ref=e490] [cursor=pointer]:
        - generic [ref=e491]:
          - generic [ref=e492]: Как проходит оплата?
          - img [ref=e494]
        - paragraph [ref=e496]: "Стандартно работаем так: 50% предоплата и оставшиеся 50% за 3 дня до мероприятия. Документы можно оформить электронно, а детали согласовать дистанционно — в созвоне или переписке."
      - generic [ref=e497] [cursor=pointer]:
        - generic [ref=e498]:
          - generic [ref=e499]: От чего зависит стоимость и можно ли уложиться в нужный бюджет?
          - img [ref=e501]
        - paragraph [ref=e503]: "Стоимость зависит от формата заказа, количества гостей, состава меню, уровня подачи, посуды, обслуживания и дополнительных услуг. Решения есть в разном бюджете: от более простых гастробоксов до полного сопровождения мероприятия. На этапе согласования подбираем вариант под ваш запрос и сразу смотрим, во что реально можно уложиться."
      - generic [ref=e504] [cursor=pointer]:
        - generic [ref=e505]:
          - generic [ref=e506]: Как доставляете заказ и в каком виде он приезжает?
          - img [ref=e508]
        - paragraph [ref=e510]: Готовим в день отдачи. Перед отправкой фотографируем заказ и отправляем фото клиенту, а упаковку собираем так, чтобы еда приехала в том же виде, в котором её отправили. Если в доставке по сторонним причинам что-то повредилось, возвращаем стоимость; если проблема возникает на мероприятии, стараемся либо оперативно решить её на месте, либо возвращаем деньги.
