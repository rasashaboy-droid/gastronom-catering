      - generic [ref=e397] [cursor=pointer]:
        - generic [ref=e398]:
          - generic [ref=e399]: За сколько дней нужно бронировать?
          - img [ref=e401]
        - paragraph [ref=e404]: Лучше обращаться заранее, но в целом можем взять заказ и за сутки. Для мероприятий это тоже рабочий срок. Если событие крупное, с индивидуальным меню, оформлением или дополнительными услугами, лучше писать раньше — так будет больше времени спокойно всё согласовать.
      - generic [ref=e405] [cursor=pointer]:
        - generic [ref=e406]:
          - generic [ref=e407]: Можно ли заказать посуду, сервировку и обслуживание?
          - img [ref=e409]
        - paragraph [ref=e411]: Да. Можем привезти еду в боксах, сделать выкладку на вашу посуду или привезти свою. При необходимости добавим сервировку, обслуживание на мероприятии, приготовление на площадке, декор и другие детали — всё это можно собрать в одном заказе.
      - generic [ref=e412] [cursor=pointer]:
        - generic [ref=e413]:
          - generic [ref=e414]: Можно ли сделать халяль, веган или другое особое меню?
          - img [ref=e416]
        - paragraph [ref=e418]: "Да, меню можно адаптировать под запрос гостей. Халяль делаем отдельно: для этого используем отдельные халяльные ножи и доски и закупаем халяльные продукты животного происхождения. Если есть другие ограничения по составу, их тоже лучше обсудить заранее при согласовании меню."
      - generic [ref=e419] [cursor=pointer]:
        - generic [ref=e420]:
          - generic [ref=e421]: Как проходит оплата?
          - img [ref=e423]
        - paragraph [ref=e425]: "Стандартно работаем так: 50% предоплата и оставшиеся 50% за 3 дня до мероприятия. Документы можно оформить электронно, а детали согласовать дистанционно — в созвоне или переписке."
      - generic [ref=e426] [cursor=pointer]:
        - generic [ref=e427]:
          - generic [ref=e428]: От чего зависит стоимость и можно ли уложиться в нужный бюджет?
          - img [ref=e430]
        - paragraph [ref=e432]: "Стоимость зависит от формата заказа, количества гостей, состава меню, уровня подачи, посуды, обслуживания и дополнительных услуг. Решения есть в разном бюджете: от более простых гастробоксов до полного сопровождения мероприятия. На этапе согласования подбираем вариант под ваш запрос и сразу смотрим, во что реально можно уложиться."
      - generic [ref=e433] [cursor=pointer]:
        - generic [ref=e434]:
          - generic [ref=e435]: Как доставляете заказ и в каком виде он приезжает?
          - img [ref=e437]
        - paragraph [ref=e439]: Готовим в день отдачи. Перед отправкой фотографируем заказ и отправляем фото клиенту, а упаковку собираем так, чтобы еда приехала в том же виде, в котором её отправили. Если в доставке по сторонним причинам что-то повредилось, возвращаем стоимость; если проблема возникает на мероприятии, стараемся либо оперативно решить её на месте, либо возвращаем деньги.
