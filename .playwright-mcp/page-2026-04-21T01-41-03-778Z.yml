    - generic [ref=e470]:
      - generic [ref=e471] [cursor=pointer]:
        - generic [ref=e472]:
          - generic [ref=e473]: За сколько дней нужно бронировать?
          - img [ref=e475]
        - paragraph [ref=e478]: Лучше обращаться заранее, но в целом можем взять заказ и за сутки. Для мероприятий это тоже рабочий срок. Если событие крупное, с индивидуальным меню, оформлением или дополнительными услугами, лучше писать раньше — так будет больше времени спокойно всё согласовать.
      - generic [ref=e479] [cursor=pointer]:
        - generic [ref=e480]:
          - generic [ref=e481]: Можно ли заказать посуду, сервировку и обслуживание?
          - img [ref=e483]
        - paragraph [ref=e485]: Да. Можем привезти еду в боксах, сделать выкладку на вашу посуду или привезти свою. При необходимости добавим сервировку, обслуживание на мероприятии, приготовление на площадке, декор и другие детали — всё это можно собрать в одном заказе.
      - generic [ref=e486] [cursor=pointer]:
        - generic [ref=e487]:
          - generic [ref=e488]: Можно ли сделать халяль, веган или другое особое меню?
          - img [ref=e490]
        - paragraph [ref=e492]: "Да, меню можно адаптировать под запрос гостей. Халяль делаем отдельно: для этого используем отдельные халяльные ножи и доски и закупаем халяльные продукты животного происхождения. Если есть другие ограничения по составу, их тоже лучше обсудить заранее при согласовании меню."
      - generic [ref=e493] [cursor=pointer]:
        - generic [ref=e494]:
          - generic [ref=e495]: Как проходит оплата?
          - img [ref=e497]
        - paragraph [ref=e499]: "Стандартно работаем так: 50% предоплата и оставшиеся 50% за 3 дня до мероприятия. Документы можно оформить электронно, а детали согласовать дистанционно — в созвоне или переписке."
      - generic [ref=e500] [cursor=pointer]:
        - generic [ref=e501]:
          - generic [ref=e502]: От чего зависит стоимость и можно ли уложиться в нужный бюджет?
          - img [ref=e504]
        - paragraph [ref=e506]: "Стоимость зависит от формата заказа, количества гостей, состава меню, уровня подачи, посуды, обслуживания и дополнительных услуг. Решения есть в разном бюджете: от более простых гастробоксов до полного сопровождения мероприятия. На этапе согласования подбираем вариант под ваш запрос и сразу смотрим, во что реально можно уложиться."
      - generic [ref=e507] [cursor=pointer]:
        - generic [ref=e508]:
          - generic [ref=e509]: Как доставляете заказ и в каком виде он приезжает?
          - img [ref=e511]
        - paragraph [ref=e513]: Готовим в день отдачи. Перед отправкой фотографируем заказ и отправляем фото клиенту, а упаковку собираем так, чтобы еда приехала в том же виде, в котором её отправили. Если в доставке по сторонним причинам что-то повредилось, возвращаем стоимость; если проблема возникает на мероприятии, стараемся либо оперативно решить её на месте, либо возвращаем деньги.
