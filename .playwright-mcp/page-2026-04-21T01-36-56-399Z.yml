    - generic [ref=e438]:
      - generic [ref=e439] [cursor=pointer]:
        - generic [ref=e440]:
          - generic [ref=e441]: За сколько дней нужно бронировать?
          - img [ref=e443]
        - paragraph [ref=e446]: Лучше обращаться заранее, но в целом можем взять заказ и за сутки. Для мероприятий это тоже рабочий срок. Если событие крупное, с индивидуальным меню, оформлением или дополнительными услугами, лучше писать раньше — так будет больше времени спокойно всё согласовать.
      - generic [ref=e447] [cursor=pointer]:
        - generic [ref=e448]:
          - generic [ref=e449]: Можно ли заказать посуду, сервировку и обслуживание?
          - img [ref=e451]
        - paragraph [ref=e453]: Да. Можем привезти еду в боксах, сделать выкладку на вашу посуду или привезти свою. При необходимости добавим сервировку, обслуживание на мероприятии, приготовление на площадке, декор и другие детали — всё это можно собрать в одном заказе.
      - generic [ref=e454] [cursor=pointer]:
        - generic [ref=e455]:
          - generic [ref=e456]: Можно ли сделать халяль, веган или другое особое меню?
          - img [ref=e458]
        - paragraph [ref=e460]: "Да, меню можно адаптировать под запрос гостей. Халяль делаем отдельно: для этого используем отдельные халяльные ножи и доски и закупаем халяльные продукты животного происхождения. Если есть другие ограничения по составу, их тоже лучше обсудить заранее при согласовании меню."
      - generic [ref=e461] [cursor=pointer]:
        - generic [ref=e462]:
          - generic [ref=e463]: Как проходит оплата?
          - img [ref=e465]
        - paragraph [ref=e467]: "Стандартно работаем так: 50% предоплата и оставшиеся 50% за 3 дня до мероприятия. Документы можно оформить электронно, а детали согласовать дистанционно — в созвоне или переписке."
      - generic [ref=e468] [cursor=pointer]:
        - generic [ref=e469]:
          - generic [ref=e470]: От чего зависит стоимость и можно ли уложиться в нужный бюджет?
          - img [ref=e472]
        - paragraph [ref=e474]: "Стоимость зависит от формата заказа, количества гостей, состава меню, уровня подачи, посуды, обслуживания и дополнительных услуг. Решения есть в разном бюджете: от более простых гастробоксов до полного сопровождения мероприятия. На этапе согласования подбираем вариант под ваш запрос и сразу смотрим, во что реально можно уложиться."
      - generic [ref=e475] [cursor=pointer]:
        - generic [ref=e476]:
          - generic [ref=e477]: Как доставляете заказ и в каком виде он приезжает?
          - img [ref=e479]
        - paragraph [ref=e481]: Готовим в день отдачи. Перед отправкой фотографируем заказ и отправляем фото клиенту, а упаковку собираем так, чтобы еда приехала в том же виде, в котором её отправили. Если в доставке по сторонним причинам что-то повредилось, возвращаем стоимость; если проблема возникает на мероприятии, стараемся либо оперативно решить её на месте, либо возвращаем деньги.
