        - generic [ref=e422]:
          - generic [ref=e423]: За сколько дней нужно бронировать?
          - img [ref=e425]
        - paragraph [ref=e428]: Лучше обращаться заранее, но в целом можем взять заказ и за сутки. Для мероприятий это тоже рабочий срок. Если событие крупное, с индивидуальным меню, оформлением или дополнительными услугами, лучше писать раньше — так будет больше времени спокойно всё согласовать.
      - generic [ref=e429] [cursor=pointer]:
        - generic [ref=e430]:
          - generic [ref=e431]: Можно ли заказать посуду, сервировку и обслуживание?
          - img [ref=e433]
        - paragraph [ref=e435]: Да. Можем привезти еду в боксах, сделать выкладку на вашу посуду или привезти свою. При необходимости добавим сервировку, обслуживание на мероприятии, приготовление на площадке, декор и другие детали — всё это можно собрать в одном заказе.
      - generic [ref=e436] [cursor=pointer]:
        - generic [ref=e437]:
          - generic [ref=e438]: Можно ли сделать халяль, веган или другое особое меню?
          - img [ref=e440]
        - paragraph [ref=e442]: "Да, меню можно адаптировать под запрос гостей. Халяль делаем отдельно: для этого используем отдельные халяльные ножи и доски и закупаем халяльные продукты животного происхождения. Если есть другие ограничения по составу, их тоже лучше обсудить заранее при согласовании меню."
      - generic [ref=e443] [cursor=pointer]:
        - generic [ref=e444]:
          - generic [ref=e445]: Как проходит оплата?
          - img [ref=e447]
        - paragraph [ref=e449]: "Стандартно работаем так: 50% предоплата и оставшиеся 50% за 3 дня до мероприятия. Документы можно оформить электронно, а детали согласовать дистанционно — в созвоне или переписке."
      - generic [ref=e450] [cursor=pointer]:
        - generic [ref=e451]:
          - generic [ref=e452]: От чего зависит стоимость и можно ли уложиться в нужный бюджет?
          - img [ref=e454]
        - paragraph [ref=e456]: "Стоимость зависит от формата заказа, количества гостей, состава меню, уровня подачи, посуды, обслуживания и дополнительных услуг. Решения есть в разном бюджете: от более простых гастробоксов до полного сопровождения мероприятия. На этапе согласования подбираем вариант под ваш запрос и сразу смотрим, во что реально можно уложиться."
      - generic [ref=e457] [cursor=pointer]:
        - generic [ref=e458]:
          - generic [ref=e459]: Как доставляете заказ и в каком виде он приезжает?
          - img [ref=e461]
        - paragraph [ref=e463]: Готовим в день отдачи. Перед отправкой фотографируем заказ и отправляем фото клиенту, а упаковку собираем так, чтобы еда приехала в том же виде, в котором её отправили. Если в доставке по сторонним причинам что-то повредилось, возвращаем стоимость; если проблема возникает на мероприятии, стараемся либо оперативно решить её на месте, либо возвращаем деньги.
