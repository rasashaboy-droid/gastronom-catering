  - generic [ref=e468]:
    - generic [ref=e469]:
      - generic [ref=e470]: 05 · Вопросы
      - heading "Часто спрашивают" [level=2] [ref=e472]
      - paragraph [ref=e473]: Не нашли ответ? Напишите в мессенджер — отвечаем за 15 минут.
      - link "Написать менеджеру" [ref=e474] [cursor=pointer]:
        - /url: "#cta"
        - img [ref=e475]
        - text: Написать менеджеру
    - generic [ref=e478]:
      - generic [ref=e479] [cursor=pointer]:
        - generic [ref=e480]:
          - generic [ref=e481]: За сколько дней нужно бронировать?
          - img [ref=e483]
        - paragraph [ref=e486]: Лучше обращаться заранее, но в целом можем взять заказ и за сутки. Для мероприятий это тоже рабочий срок. Если событие крупное, с индивидуальным меню, оформлением или дополнительными услугами, лучше писать раньше — так будет больше времени спокойно всё согласовать.
      - generic [ref=e487] [cursor=pointer]:
        - generic [ref=e488]:
          - generic [ref=e489]: Можно ли заказать посуду, сервировку и обслуживание?
          - img [ref=e491]
        - paragraph [ref=e493]: Да. Можем привезти еду в боксах, сделать выкладку на вашу посуду или привезти свою. При необходимости добавим сервировку, обслуживание на мероприятии, приготовление на площадке, декор и другие детали — всё это можно собрать в одном заказе.
      - generic [ref=e494] [cursor=pointer]:
        - generic [ref=e495]:
          - generic [ref=e496]: Можно ли сделать халяль, веган или другое особое меню?
          - img [ref=e498]
        - paragraph [ref=e500]: "Да, меню можно адаптировать под запрос гостей. Халяль делаем отдельно: для этого используем отдельные халяльные ножи и доски и закупаем халяльные продукты животного происхождения. Если есть другие ограничения по составу, их тоже лучше обсудить заранее при согласовании меню."
      - generic [ref=e501] [cursor=pointer]:
        - generic [ref=e502]:
          - generic [ref=e503]: Как проходит оплата?
          - img [ref=e505]
        - paragraph [ref=e507]: "Стандартно работаем так: 50% предоплата и оставшиеся 50% за 3 дня до мероприятия. Документы можно оформить электронно, а детали согласовать дистанционно — в созвоне или переписке."
      - generic [ref=e508] [cursor=pointer]:
        - generic [ref=e509]:
          - generic [ref=e510]: От чего зависит стоимость и можно ли уложиться в нужный бюджет?
          - img [ref=e512]
        - paragraph [ref=e514]: "Стоимость зависит от формата заказа, количества гостей, состава меню, уровня подачи, посуды, обслуживания и дополнительных услуг. Решения есть в разном бюджете: от более простых гастробоксов до полного сопровождения мероприятия. На этапе согласования подбираем вариант под ваш запрос и сразу смотрим, во что реально можно уложиться."
      - generic [ref=e515] [cursor=pointer]:
        - generic [ref=e516]:
          - generic [ref=e517]: Как доставляете заказ и в каком виде он приезжает?
          - img [ref=e519]
        - paragraph [ref=e521]: Готовим в день отдачи. Перед отправкой фотографируем заказ и отправляем фото клиенту, а упаковку собираем так, чтобы еда приехала в том же виде, в котором её отправили. Если в доставке по сторонним причинам что-то повредилось, возвращаем стоимость; если проблема возникает на мероприятии, стараемся либо оперативно решить её на месте, либо возвращаем деньги.
